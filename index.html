<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TETRIS MUSICAL - SEA 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4a90e2; 
            --secondary: #ff5e57; 
            --accent: #ffc107; 
            --text: #2c3e50;
            --glass: rgba(255, 255, 255, 0.9);
            --fredoka: 'Fredoka One', cursive;
            --nunito: 'Nunito', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            font-family: var(--nunito);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Bloquea el scroll para que no interfiera con el juego */
        }

        .app-header {
            width: 100%;
            background: white;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 4px solid var(--primary);
        }

        .header-container {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-logo { height: 45px; border-radius: 5px; }

        #game-master {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding: 15px;
            background: var(--glass);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .side-panel { display: flex; flex-direction: column; gap: 10px; }

        .widget {
            background: white;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            min-width: 80px;
        }

        .widget h3 { margin: 0; font-size: 0.7rem; color: #999; font-family: var(--fredoka); }
        .val { font-size: 1.4rem; font-weight: 900; color: var(--primary); }

        #game-board-container {
            position: relative;
            background: #fff;
            border-radius: 12px;
            border: 4px solid #eee;
            line-height: 0;
        }

        canvas#tetris {
            background: #fafafa;
            width: 240px; /* Tamaño optimizado para móviles */
            height: 480px;
        }

        .game-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 8px;
        }

        .btn-start {
            background: var(--accent);
            border: none;
            width: 100px; height: 100px;
            border-radius: 50%;
            font-family: var(--fredoka);
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 6px 0 #d4a017;
            cursor: pointer;
        }

        /* Instrucción visual rápida */
        .hint {
            position: fixed;
            bottom: 20px;
            color: var(--text);
            font-size: 0.8rem;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-container">
        <img src="logo2.jpg" class="app-logo" alt="Logo">
        <div style="font-family: var(--fredoka); color: var(--primary)">TETRIS MUSICAL</div>
        <img src="logo_header.png" class="app-logo" alt="Logo SEA">
    </div>
</header>

<main id="game-master">
    <div id="game-board-container">
        <div id="overlay" class="game-overlay">
            <button class="btn-start" onclick="initGame()">JUGAR</button>
        </div>
        <canvas id="tetris" width="240" height="480"></canvas>
    </div>

    <aside class="side-panel">
        <div class="widget">
            <h3>PUNTOS</h3>
            <div id="score" class="val">0</div>
        </div>
        <div class="widget">
            <h3>SIGUIENTE</h3>
            <canvas id="nextCanvas" width="60" height="60"></canvas>
        </div>
    </aside>
</main>

<div class="hint">Arrastra para mover • Toca para rotar</div>

<script>
(() => {
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nCtx = nextCanvas.getContext('2d');
    
    context.scale(24, 24);
    nCtx.scale(15, 15);

    const colors = [null, '#4a90e2', '#e67e22', '#f1c40f', '#2ecc71', '#e74c3c', '#9b59b6', '#34495e'];
    const symbols = [null, '♪', '♫', '♩', '♬', '♭', '♮', '♯'];

    function createPiece(type) {
        if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
        if (type === 'O') return [[4, 4], [4, 4]];
        if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
    }

    const arena = Array.from({length: 20}, () => Array(10).fill(0));
    const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

    function draw() {
        context.fillStyle = '#fff';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0}, context);
        drawMatrix(player.matrix, player.pos, context);
    }

    function drawMatrix(matrix, offset, ctx) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    ctx.fillStyle = colors[value];
                    ctx.fillRect(x + offset.x, y + offset.y, 0.9, 0.9);
                    ctx.fillStyle = 'white';
                    ctx.font = '0.6px Arial';
                    ctx.fillText(symbols[value], x + offset.x + 0.2, y + offset.y + 0.7);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[Math.random() * pieces.length | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            gameRunning = false;
            document.getElementById('overlay').style.display = 'flex';
        }
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function arenaSweep() {
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            arena.splice(y, 1)[0].fill(0);
            arena.unshift(new Array(10).fill(0));
            player.score += 10;
        }
        document.getElementById('score').innerText = player.score;
    }

    function playerRotate() {
        const matrix = player.matrix;
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
        matrix.forEach(row => row.reverse());
        if (collide(arena, player)) matrix.forEach(row => row.reverse()); // Deshacer si choca
    }

    let dropCounter = 0, lastTime = 0, gameRunning = false;
    function update(time = 0) {
        if (!gameRunning) return;
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > 1000) playerDrop();
        draw();
        requestAnimationFrame(update);
    }

    window.initGame = () => {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        playerReset();
        gameRunning = true;
        document.getElementById('overlay').style.display = 'none';
        update();
    };

    // --- LÓGICA DE ARRASTRE Y TOQUE ---
    let touchStartX = 0;
    let touchStartY = 0;
    let initialPieceX = 0;

    canvas.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        initialPieceX = player.pos.x;
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if (!gameRunning) return;
        e.preventDefault();
        
        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        
        // Calcular movimiento horizontal (arrastre)
        const diffX = touchX - touchStartX;
        const stepX = Math.floor(diffX / 30); // Sensibilidad del arrastre
        
        const oldX = player.pos.x;
        player.pos.x = initialPieceX + stepX;
        if (collide(arena, player)) player.pos.x = oldX;

        // Aceleración hacia abajo
        if (touchY - touchStartY > 50) playerDrop();
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;

        // Si el dedo apenas se movió, es un TAP (Rotar)
        if (Math.abs(touchEndX - touchStartX) < 10 && Math.abs(touchEndY - touchStartY) < 10) {
            playerRotate();
        }
    });

})();
</script>
</body>
</html>
